# Local pre-commit guards — the same checks CI runs, but before the commit
# lands, so a red CI is rare. Install once:  pip install pre-commit && pre-commit install
# Run on everything:  pre-commit run --all-files
# (Pinned revs; Dependabot/`pre-commit autoupdate` bumps them.)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17        # keep in sync with requirements-dev.txt
    hooks:
      - id: ruff         # lint (same rules as CI)
        args: [--fix]
      - id: ruff-format  # format check

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml         # the workflows / dependabot / this file
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: mixed-line-ending
        args: [--fix=lf]
