# Auto-merge guard for Claude's self-repair PRs.
#
# Decides — by WHICH FILES changed — whether a bot fix may auto-merge or must go
# to a human. This uses an ALLOWLIST, not a denylist: only low-blast-radius
# DATA paths auto-merge; everything else (all code, all workflows, providers,
# stateful backend) escalates to a human.
#
# Why an allowlist: this is a PUBLIC repo and the upstream repair agent is
# driven by public issue text. A denylist auto-merged `.github/**` and
# `providers.py` — so a bot PR could weaken its own gates or add an outbound-
# request line and merge with no human, then run on `main` with production
# secrets. CI/Semgrep/invariant tests are real but NOT a sufficient trust
# boundary for arbitrary code changes (a PR can pass its own weakened checks).
#
#   AUTO-MERGE (armed, then GitHub merges only when required checks pass) — ONLY:
#     - scam_blocklist_autogen.txt  -> machine-generated scam-domain growth.
#     - tests/**                    -> test-only changes (can't ship runtime code).
#
#   ESCALATE to a human (label `needs-human`, never auto-merge):
#     - ANYTHING else, including code (find_admin_jobs.py, providers.py, app/**),
#       .github/** workflows, supabase/**, portal/**, scam_blocklist.txt.
#
# Only acts on branches Claude creates (claude/*). Human PRs are untouched.

name: Auto-merge Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# One guard run per PR; a new push supersedes the prior arming.
concurrency:
  group: guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    # claude/* is the bot's branch prefix, but a branch name is spoofable, so
    # also require the PR author to actually be a bot account. A human's
    # claude/* PR is therefore never auto-merged.
    if: startsWith(github.head_ref, 'claude/') && github.event.pull_request.user.type == 'Bot'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Decide auto-merge vs escalate by changed paths
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          files="$(gh pr view "$PR" --json files --jq '.files[].path')"
          echo "Changed files:"; echo "$files"
          # ALLOWLIST: a PR auto-merges only if EVERY changed file is a low-blast-
          # radius data/test path. Any file outside the allowlist -> escalate.
          outside="$(printf '%s\n' "$files" | grep -vE '^(scam_blocklist_autogen\.txt$|tests/)' || true)"
          if [ -n "$outside" ]; then
            echo "::notice::Escalating PR #$PR — changes paths outside the auto-merge allowlist."
            gh pr edit "$PR" --add-label needs-human || true
            gh pr comment "$PR" --body "$(printf '%s\n' \
              '🛑 **Escalated for human review** — this automated fix changes paths outside the auto-merge allowlist:' \
              '```' "$outside" '```' \
              'Only `scam_blocklist_autogen.txt` and `tests/**` auto-merge. All code, workflows, providers, and stateful backend require a human review before merge.'"
          else
            echo "::notice::Arming auto-merge for PR #$PR — allowlisted data/test paths only."
            gh pr comment "$PR" --body '🤖 **Auto-merge armed** — this fix touches only allowlisted data/test paths (`scam_blocklist_autogen.txt`, `tests/**`). It will merge automatically **only when all required checks pass**; otherwise it stays open for review.'
            gh pr merge "$PR" --squash --auto
          fi
