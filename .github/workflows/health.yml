name: Health Monitor (self-repair signal)

# Every 6 hours: confirm the live site is up + fresh, the Supabase portal is
# reachable, and the companion function is alive. On ANY failure, open (or
# reuse) a single GitHub issue so the problem is never silent — that issue is
# the human/repair signal. Read-only checks; nothing here can break the site.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check live site, freshness, Supabase, companion
        id: check
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -uo pipefail
          fail() { echo "::error::$1"; echo "$1" >> /tmp/fails.txt; }
          : > /tmp/fails.txt
          SITE="https://bflinkdesign.github.io/dsm-jobs/"

          # 1) Live site is up (served URL returns 200). The GitHub Pages CDN has
          #    per-edge propagation, so we DON'T grep the served HTML (an edge can
          #    briefly return a contentless 200); 200 alone = the CDN is serving.
          code="000"
          for attempt in 1 2 3 4; do
            code="$(curl -s -m 25 -o /dev/null -w '%{http_code}' "$SITE" || echo 000)"
            [ "$code" = "200" ] && break
            echo "site attempt $attempt: HTTP $code (retrying)"; sleep 15
          done
          [ "$code" = "200" ] || fail "Live site HTTP $code after retries (expected 200)"

          # 2) Published content + freshness: read the AUTHORITATIVE gh-pages
          #    branch via raw.githubusercontent (CDN-independent ground truth).
          RAW="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/index.html"
          pub="$(curl -s -m 25 "$RAW" || true)"
          printf '%s' "$pub" | grep -q "Job Board" || fail "Published gh-pages build missing 'Job Board' marker"
          updated="$(printf '%s' "$pub" | grep -oE 'updated [0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1 | awk '{print $2}')"
          if [ -n "$updated" ]; then
            age=$(( ( $(date +%s) - $(date -d "$updated" +%s) ) / 86400 ))
            echo "published build updated $updated (${age}d ago)"
            [ "$age" -le 3 ] || fail "Published build is stale: $updated (${age} days ago) — daily scan may be failing"
          else
            fail "Could not read 'updated' date from the published build"
          fi

          # 3) Supabase portal liveness — use GoTrue's public /auth/v1/health
          #    (the jobs table is authenticated-only by RLS, so an anon probe of
          #    it correctly returns 401 — that's by design, not an outage).
          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            ac="$(curl -s -m 25 -o /dev/null -w '%{http_code}' \
              "$SUPABASE_URL/auth/v1/health" -H "apikey: $SUPABASE_PUBLISHABLE_KEY" || echo 000)"
            [ "$ac" = "200" ] || fail "Supabase auth health HTTP $ac (expected 200)"
            fc="$(curl -s -m 25 -o /dev/null -w '%{http_code}' -X POST \
              "$SUPABASE_URL/functions/v1/companion" -H 'Content-Type: application/json' -d '{}' || echo 000)"
            case "$fc" in 200|400|401|429) echo "companion fn alive ($fc)";; *) fail "Companion fn HTTP $fc (expected 200/400/401/429)";; esac
          else
            echo "Supabase not configured in secrets — skipping portal checks (not a failure)."
          fi

          if [ -s /tmp/fails.txt ]; then
            { echo "summary<<EOF"; cat /tmp/fails.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All health checks passed."

      - name: Open/refresh an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Automated health check failed at ${new Date().toISOString()}.\n\n` +
              "```\n" + (process.env.SUMMARY || "see workflow logs") + "\n```\n\n" +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "🩺 Health check failing";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "health" });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["health", "automated"] });
            }
        env:
          SUMMARY: ${{ steps.check.outputs.summary }}
