name: Health Monitor (self-repair signal)

# Every 6 hours: confirm the published site is correct + fresh, the Supabase
# portal is reachable, and the companion function is alive. On ANY real failure,
# open/refresh a single GitHub issue so the problem is never silent.
#
# Design note: we do NOT grep the served Pages URL — its CDN has per-edge
# propagation and a runner can briefly see a contentless 200 while real users
# get the good build. Instead we read the AUTHORITATIVE gh-pages branch via a
# git checkout (always reliable in Actions) for content + freshness, and use the
# served URL only for an "is-up" 200.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out the published build (gh-pages)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: published
          fetch-depth: 1

      - name: Health checks
        id: check
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -uo pipefail
          fail() { echo "::error::$1"; echo "$1" >> /tmp/fails.txt; }
          : > /tmp/fails.txt
          SITE="https://bflinkdesign.github.io/dsm-jobs/"
          PAGE="published/index.html"

          # 1) Published content is the real app
          if [ -f "$PAGE" ]; then
            grep -q "Job Board" "$PAGE" || fail "Published build missing 'Job Board' marker"
          else
            fail "gh-pages index.html not found"
          fi

          # 2) Freshness: the daily scan stamps 'updated YYYY-MM-DD' in the page
          updated="$(grep -oE 'updated [0-9]{4}-[0-9]{2}-[0-9]{2}' "$PAGE" 2>/dev/null | head -1 | awk '{print $2}')"
          if [ -n "$updated" ]; then
            age=$(( ( $(date +%s) - $(date -d "$updated" +%s) ) / 86400 ))
            echo "published build updated $updated (${age}d ago)"
            [ "$age" -le 3 ] || fail "Published build is stale: $updated (${age} days ago) — daily scan may be failing"
          else
            fail "Could not read 'updated' date from the published build"
          fi

          # 3) Served URL is up (200 from any CDN edge = Pages is serving)
          code="$(curl -s -m 25 -o /dev/null -w '%{http_code}' "$SITE" || echo 000)"
          [ "$code" = "200" ] || fail "Served site HTTP $code (expected 200)"

          # 4) Supabase portal liveness (GoTrue health is public; the jobs table is
          #    authenticated-only by RLS so we never probe it anonymously) + companion
          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            ac="$(curl -s -m 25 -o /dev/null -w '%{http_code}' \
              "$SUPABASE_URL/auth/v1/health" -H "apikey: $SUPABASE_PUBLISHABLE_KEY" || echo 000)"
            [ "$ac" = "200" ] || fail "Supabase auth health HTTP $ac (expected 200)"
            fc="$(curl -s -m 25 -o /dev/null -w '%{http_code}' -X POST \
              "$SUPABASE_URL/functions/v1/companion" -H 'Content-Type: application/json' -d '{}' || echo 000)"
            case "$fc" in 200|400|401|429) echo "companion fn alive ($fc)";; *) fail "Companion fn HTTP $fc";; esac
          else
            echo "Supabase not configured — skipping portal checks (not a failure)."
          fi

          if [ -s /tmp/fails.txt ]; then
            { echo "summary<<EOF"; cat /tmp/fails.txt; echo "EOF"; } >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "All health checks passed."

      - name: Open/refresh an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Automated health check failed at ${new Date().toISOString()}.\n\n` +
              "```\n" + (process.env.SUMMARY || "see workflow logs") + "\n```\n\n" +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "🩺 Health check failing";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "health" });
            if (existing.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: existing.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner,
                repo: context.repo.repo, title, body, labels: ["health", "automated"] });
            }
        env:
          SUMMARY: ${{ steps.check.outputs.summary }}
