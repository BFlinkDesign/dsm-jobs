name: Health Monitor (self-repair signal)

# Every 6 hours: confirm the published site is correct + fresh, the Supabase
# portal is reachable, and the companion function is alive. On ANY real failure,
# open/refresh a single GitHub issue so the problem is never silent.
#
# Design note: we do NOT grep the served Pages URL — its CDN has per-edge
# propagation and a runner can briefly see a contentless 200 while real users
# get the good build. Instead we read the AUTHORITATIVE gh-pages branch via a
# git checkout (always reliable in Actions) for content + freshness, and use the
# served URL only for an "is-up" 200.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-24.04
    timeout-minutes: 6
    steps:
      - name: Check out the published build (gh-pages)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: published
          fetch-depth: 1
          persist-credentials: false   # read-only health probe; don't leave the token in git config

      - name: Health checks
        id: check
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          # The runner invokes this as `bash -e -o pipefail {0}`. That injected
          # -e (errexit) is the real trap: a grep with no match (exit 1) inside a
          # command substitution would abort the whole step BEFORE the summary is
          # written — reading as an opaque empty failure. We track failures
          # explicitly via FAILED, so turn errexit OFF and keep pipefail.
          set +e -o pipefail
          S=""; FAILED=0
          ok()  { echo "OK:  $1"; S="${S}- ✅ ${1}"$'\n'; }
          bad() { echo "::error::$1"; S="${S}- ❌ ${1}"$'\n'; FAILED=1; }
          SITE="https://bflinkdesign.github.io/dsm-jobs/"
          PAGE="published/index.html"

          # 1) Published content is the real app (read from the gh-pages checkout)
          if [ -f "$PAGE" ] && grep -q "Jobs for you" "$PAGE"; then ok "published build has the app"
          else bad "published build missing 'Jobs for you' (file: $([ -f "$PAGE" ] && echo present || echo MISSING))"; fi

          # 2) Freshness: the daily scan embeds the build date in the inline JSON
          #    as  "generated": "YYYY-MM-DD HH:MM"  (the visible "· updated ..."
          #    text is built in JS at runtime, so it is NOT in the static HTML).
          updated="$(grep -oE '"generated": *"[0-9]{4}-[0-9]{2}-[0-9]{2}' "$PAGE" 2>/dev/null | head -1 | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')"
          if [ -n "$updated" ]; then
            age=$(( ( $(date +%s) - $(date -d "$updated" +%s) ) / 86400 ))
            if [ "$age" -le 3 ]; then ok "fresh ($updated, ${age}d ago)"; else bad "stale build ($updated, ${age}d ago) — daily scan may be failing"; fi
          else bad "no 'updated' date in the published build"; fi

          # 3) Served URL is up
          code="$(curl -s -m 25 -o /dev/null -w '%{http_code}' "$SITE" || echo 000)"
          if [ "$code" = "200" ]; then ok "served site 200"; else bad "served site HTTP $code"; fi

          # 4) Supabase portal liveness (public GoTrue health; jobs table is
          #    authenticated-only by RLS so never probed anonymously) + companion
          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            ac="$(curl -s -m 25 -o /dev/null -w '%{http_code}' "$SUPABASE_URL/auth/v1/health" -H "apikey: $SUPABASE_PUBLISHABLE_KEY" || echo 000)"
            if [ "$ac" = "200" ]; then ok "supabase auth alive"; else bad "supabase auth health HTTP $ac"; fi
            fc="$(curl -s -m 25 -o /dev/null -w '%{http_code}' -X POST "$SUPABASE_URL/functions/v1/companion" -H 'Content-Type: application/json' -d '{}' || echo 000)"
            case "$fc" in 200|400|401|429) ok "companion fn alive ($fc)";; *) bad "companion fn HTTP $fc";; esac
          else S="${S}- ℹ️ Supabase not configured (skipped)"$'\n'; fi

          printf 'Health results:\n%s\n' "$S"
          printf '%s\n' "$S" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          { echo "summary<<XEOF"; printf '%s\n' "$S"; echo "XEOF"; } >> "$GITHUB_OUTPUT"
          [ "$FAILED" = 0 ] || exit 1
          echo "All health checks passed."

      - name: Open/refresh an issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = `Automated health check failed at ${new Date().toISOString()}.\n\n` +
              "```\n" + (process.env.SUMMARY || "see workflow logs") + "\n```\n\n" +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "🩺 Health check failing";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "health" });
            if (existing.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: existing.data[0].number, body });
            } else {
              const created = await github.rest.issues.create({ owner: context.repo.owner,
                repo: context.repo.repo, title, body, labels: ["health", "outage", "automated"] });
              await github.rest.issues.addLabels({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: created.data.number, labels: ["auto-fix"] });
            }
        env:
          SUMMARY: ${{ steps.check.outputs.summary }}
