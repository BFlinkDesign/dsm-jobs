# Keyless Semgrep SAST gate (Static Application Security Testing).
#
# WHAT THIS IS: scans OUR OWN source for bug / injection / XSS / hardcoded-secret
# patterns using Semgrep's OSS engine + public registry rulesets, fetched
# anonymously. NO Semgrep account, NO SEMGREP_APP_TOKEN, NO login. Free forever.
#
# WHAT THIS IS NOT: Software Composition Analysis (SCA / CVE-in-dependency
# scanning). That is Semgrep Supply Chain, a paid Cloud product that REQUIRES
# SEMGREP_APP_TOKEN. This repo is stdlib-only at runtime AND Dependabot already
# scans pip + github-actions for CVEs, so SCA would add ~zero here and is
# intentionally absent.
#
# The real gate is `--error`: any finding fails the PR. (Uploading SARIF to the
# GitHub Security tab is a free-on-public-repos bonus, left OFF — see the note.)
#
# Delivery note: we `pip install semgrep` on a plain ubuntu runner rather than
# run inside the semgrep/semgrep container, because a container's bundled Node
# can drift and break actions/checkout. The scan command is identical either way.

name: Semgrep

on:
  pull_request:
    branches: [main]      # the gate: every PR into the protected branch
  schedule:
    - cron: '37 9 * * 1'  # weekly Mon 09:37 UTC — catches new rules on unchanged code
  workflow_dispatch: {}

permissions:
  contents: read          # least privilege: only needs to read the code

jobs:
  semgrep:
    name: scan (keyless OSS)
    runs-on: ubuntu-latest
    timeout-minutes: 10   # never let a hung scan run forever (CI-hang policy)
    # Runs on EVERY PR, including Dependabot. This job is now a REQUIRED status
    # check, and a job skipped via `if:` reports "skipped" — which branch
    # protection treats as NOT satisfied, blocking the PR. The scan is keyless
    # (no token needed), so running it on Dependabot PRs is harmless and gives a
    # real pass instead of a blocking skip.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep (OSS, no account)
        run: python -m pip install --upgrade pip semgrep

      # Keyless: every --config is a PUBLIC registry ruleset pulled over HTTPS
      # with no auth. --error => exit non-zero (fail the PR) on any finding.
      #   p/python         : Python correctness + security (injection, ssrf, ...)
      #   p/secrets        : hardcoded credential / token patterns in source
      #   p/github-actions : insecure workflow patterns (this repo has 5 workflows)
      # We use `semgrep scan --config ...` (pure OSS, keyless), NOT `semgrep ci`
      # (the platform command, which expects SEMGREP_APP_TOKEN).
      - name: Semgrep keyless scan (fail on findings)
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --config p/github-actions \
            --error \
            --metrics=off \
            --disable-version-check

      # ---------------------------------------------------------------------
      # OPTIONAL: publish findings to the GitHub Security tab (Code Scanning),
      # FREE on public repos. Left OFF because (1) `--error` already blocks the
      # PR — that's the protection — and (2) github/codeql-action/upload-sarif
      # has a known bug rejecting Semgrep SARIF ("security severity value ... is
      # not a number") on some versions. To enable: add `security-events: write`
      # to permissions above, then uncomment below (note the `|| true` so SARIF
      # still uploads when findings exist).
      #
      # - name: Semgrep SARIF (keyless)
      #   run: |
      #     semgrep scan --config p/python --config p/secrets \
      #       --config p/github-actions --metrics=off --disable-version-check \
      #       --sarif --output semgrep.sarif || true
      # - name: Upload SARIF to GitHub code scanning
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: semgrep.sarif
      #   if: always()
