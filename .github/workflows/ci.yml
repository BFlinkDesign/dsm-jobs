name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10          # REQUIRED: never let a hung job run forever
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only job; don't leave the token in git config

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy, strict on portal transport)
        run: mypy

      - name: Compile check (syntax)
        run: python -m compileall -q find_admin_jobs.py providers.py portal tests

      - name: Unit + smoke tests (mock, no network)
        run: pytest --timeout=30 --timeout-method=thread

      - name: Mock pipeline end-to-end
        run: python find_admin_jobs.py --mock

  css-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only job; don't leave the token in git config

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install CSS toolchain (Lightning CSS)
        working-directory: verify/css
        run: npm ci --no-audit --no-fund    # exact, from the committed lockfile

      - name: Validate generated CSS (Lightning CSS)
        run: python verify/css/lint_css.py

  secret-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only job; don't leave the token in git config

      - name: Shape-based secret scan (no external deps)
        shell: bash
        run: |
          set -euo pipefail
          # Shapes of the secrets THIS project actually handles + common ones.
          # Each alternation requires trailing chars so this rule never matches
          # itself. JWT alternation catches legacy Supabase anon/service_role
          # keys; sk-ant catches Anthropic; sb_secret catches Supabase secret.
          PATTERN='(sk-ant-[a-zA-Z0-9_-]{20,}|sk-[a-zA-Z0-9]{20,}|sb_secret_[a-zA-Z0-9]{20,}|eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}|ghp_[a-zA-Z0-9]{36,}|gho_[a-zA-Z0-9]{36,}|xox[bp]-[a-zA-Z0-9-]{20,}|AKIA[A-Z0-9]{16}|AIza[a-zA-Z0-9_-]{35}|-----BEGIN [A-Z]+ PRIVATE KEY-----)'
          # Generic provider keys (Adzuna/JSearch) have no distinctive shape and
          # cannot be regex-matched; they are protected by .gitignore (.env,
          # web/index.html) — enable GitHub push-protection for belt-and-braces.
          if git grep -nE "$PATTERN" -- . ':!*.lock' ; then
            echo "::error::Potential secret detected (see matches above)"; exit 1
          fi
          echo "No secret shapes found."

  gitleaks:
    # Second secret layer: gitleaks' 150+ provider rules + entropy detection,
    # complementing the shape-scan above. Installed as a PINNED binary verified
    # by SHA256 (no third-party action to trust). Runs the DEFAULT ruleset with
    # NO allowlist — verified clean against the whole repo, so nothing is exempt
    # (the ci.yml secret-SHAPED regexes use literal [..] and don't false-positive).
    name: secret scan (gitleaks, pinned)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only job; don't leave the token in git config

      - name: Run gitleaks (pinned binary + checksum)
        shell: bash
        run: |
          set -euo pipefail
          VER=8.30.1
          SHA=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks dir . --no-banner --redact --exit-code 1

  zizmor:
    # GitHub Actions static analysis: catches insecure workflow patterns
    # (credential persistence / "artipacked", template injection, over-broad
    # permissions, ref confusion, ...). Pinned, pip-installed (zizmor ships
    # wheels). Run --offline for determinism: every audit we rely on is local,
    # and all our actions are already SHA-pinned, so no online check adds signal.
    name: actions static analysis (zizmor, pinned)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only job; don't leave the token in git config

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install zizmor (pinned)
        run: python -m pip install --upgrade pip && pip install zizmor==1.16.0

      - name: Run zizmor (fail on any finding)
        run: zizmor --offline --persona regular .github/workflows/*.yml
