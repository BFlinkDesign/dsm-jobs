# Live-model behavioral eval for the companion (Ruby).
#
# Sends adversarial messages through the REAL model using the deployed system
# prompt and asserts Ruby behaves safely (crisis routing, no confabulation, the
# daytime/remote availability boundary, the not-a-therapist boundary). This is
# the behavioral half of the verification story — grounding_test.ts/safety_test.ts
# cover the structural half in edge-checks.yml.
#
# Costs a few cents of tokens per run, so it is NOT on pull_request. It runs on
# demand and weekly, and self-skips (clean exit 0) when ANTHROPIC_API_KEY is
# unset or Anthropic credits are exhausted — so a fork or an unfunded repo never
# fails. Enable it by setting the ANTHROPIC_API_KEY repo secret.

name: Companion Behavioral Eval

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 13 * * 1" # weekly, Monday 13:00 UTC — catches prompt/model drift

permissions:
  contents: read

concurrency:
  group: companion-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: behavioral eval (live model)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Read-only; never pushes (zizmor: artipacked).
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Run behavioral eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          deno run \
            --allow-net=api.anthropic.com \
            --allow-env=ANTHROPIC_API_KEY \
            --allow-read=supabase/functions \
            supabase/functions/companion/behavioral_eval.ts
