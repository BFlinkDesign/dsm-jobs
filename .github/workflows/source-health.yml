name: Source Health (weekly)

# Weekly: probe every keyless job source (Greenhouse/Lever boards, government
# feeds, Workday tenants, SmartRecruiters) and report which are alive. A source
# that goes UNREACHABLE opens an issue so dead boards get fixed or removed —
# the "self-evolving" signal that keeps the feed honest over time.

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  source-health:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # read-only probe; don't leave the token in git config
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Probe job sources
        id: probe
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/source_health.py | tee /tmp/report.txt
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/report.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $code
      - name: Persist empty-feed counters
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/source_health_state.json
          git diff --staged --quiet || (git commit -m "chore: update source health empty-feed state" && git push)
      - name: Open/refresh an issue if a source is dead
        if: steps.probe.outputs.code == '1'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = "Weekly source-health probe found a DEAD job source.\n\n```\n" +
              (process.env.REPORT || "see workflow logs") + "\n```\n\n" +
              `Fix the endpoint or drop it from providers.py. Run: ` +
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "🔌 A job source is down";
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "source-health" });
            if (open.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner,
                repo: context.repo.repo, title, body, labels: ["source-health", "outage", "automated"] });
            }
        env:
          REPORT: ${{ steps.probe.outputs.report }}
      - name: Open/refresh an issue if feeds should be pruned
        if: steps.probe.outputs.code == '2'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = "Weekly source-health: feeds empty for 4+ consecutive checks.\n\n```\n" +
              (process.env.REPORT || "see workflow logs") + "\n```\n\n" +
              "Consider removing these slugs from `providers.py` to reduce scan noise.";
            const title = "🧹 Job feeds to prune (long-empty)";
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "source-prune" });
            if (open.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: open.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner,
                repo: context.repo.repo, title, body, labels: ["source-prune", "maintenance", "automated"] });
            }
        env:
          REPORT: ${{ steps.probe.outputs.report }}
      - name: Fail job if probe failed
        if: steps.probe.outputs.code != '0'
        run: exit ${{ steps.probe.outputs.code }}
