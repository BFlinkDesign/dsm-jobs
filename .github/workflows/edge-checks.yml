# Deno/TypeScript checks for the Supabase Edge Functions.
#
# WHY THIS EXISTS: the repo's other CI (ci.yml) is Python-only — it never
# type-checks, lints, or runs the Deno/TS edge-function code under
# supabase/functions/. That code is the most safety-critical runtime in the
# project: companion/index.ts talks to a vulnerable user (crisis-resource
# routing, not-a-therapist boundary, anti-confabulation grounding) and holds the
# paid Anthropic key behind a fail-closed rate cap. This job is its proof loop.
#
# It covers EVERY function (deno check + deno lint over all of supabase/functions),
# runs every *_test.ts, and a coverage gate fails loudly if a function loses its
# type-check or if the companion loses its safety test.

name: Edge Checks

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - ".github/workflows/edge-checks.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: edge-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: deno check + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # This job only reads code to verify it; it never pushes.
          # Don't persist the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      # Type-check every .ts under supabase/functions (entrypoints, shared, tests),
      # enumerated from disk so a newly-added function is covered automatically.
      - name: Type check (deno check)
        run: |
          set -euo pipefail
          mapfile -t files < <(find supabase/functions -name '*.ts' | sort)
          printf 'deno check over %d files:\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"
          deno check "${files[@]}"

      - name: Lint (deno lint)
        run: deno lint supabase/functions/

      # Run every *_test.ts. --allow-read lets the companion safety_test read its
      # own source; --allow-env is scoped to the spend-cap alert env names (used by
      # _shared tests once they land on main). No net/write is granted.
      - name: Unit tests (deno test)
        run: |
          deno test \
            --allow-read=supabase/functions \
            --allow-env=RESEND_API_KEY,ALERT_EMAIL_FROM,ALERT_EMAIL_TO \
            supabase/functions/

      # Coverage gate (enumerate-and-assert, ported from eagle-quote): every
      # function entrypoint must be type-checked (it is, via the find above), and
      # the safety-critical companion must never lose its test.
      - name: Coverage gate
        run: |
          set -euo pipefail
          fail=0
          for d in supabase/functions/*/; do
            f="${d}index.ts"
            [ -f "$f" ] || continue
            name="$(basename "$d")"
            if ls "${d}"*_test.ts >/dev/null 2>&1; then
              echo "OK  ${name}: type-checked + has runtime test(s)"
            else
              echo "WARN ${name}: type-checked, NO runtime test yet"
            fi
          done
          if ! ls supabase/functions/companion/*_test.ts >/dev/null 2>&1; then
            echo "::error::companion has no *_test.ts — its grounding/crisis-safety coverage was removed"
            fail=1
          fi
          exit $fail
