# Deno/TypeScript checks for the Supabase Edge Functions.
#
# WHY THIS EXISTS: the repo's other CI (ci.yml) is Python-only — it never
# type-checks or runs the Deno/TS edge-function code under supabase/functions/.
# The AI spend-cap helper (_shared/spend_cap.ts) is security-load-bearing (it
# FAILS CLOSED so a stuck loop can't run up the Anthropic bill), so it needs its
# own proof loop. This job type-checks the functions and runs the Deno unit
# suite (_shared/spend_cap_test.ts) on every PR that touches the functions.
#
# Keyless: `denoland/setup-deno` just installs the Deno toolchain; the test
# pulls jsr:@std/assert + npm:@supabase/supabase-js over HTTPS, no account/token.

name: Edge Checks

on:
  pull_request:
    # Only run when the edge-function code actually changes. NOTE: because this
    # is path-filtered, GitHub reports "skipped" for unrelated PRs — do NOT make
    # this a REQUIRED status check unless paired with a path-aware gate, since
    # branch protection treats a skipped required check as unsatisfied.
    paths:
      - "supabase/functions/**"
      - ".github/workflows/edge-checks.yml"
  workflow_dispatch: {}

permissions:
  contents: read          # least privilege: only needs to read the code

concurrency:
  group: edge-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: deno check + test
    runs-on: ubuntu-latest
    timeout-minutes: 10   # never let a hung job run forever (CI-hang policy)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # This job only reads code to type-check/test it; it never pushes.
          # Don't persist the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      # Type-check the functions + the test. Explicit file list (not a shell
      # glob) so a path typo fails loudly instead of silently checking nothing.
      - name: Type check (deno check)
        working-directory: supabase/functions
        run: |
          deno check \
            _shared/spend_cap.ts \
            _shared/spend_cap_test.ts \
            companion/index.ts

      # Run the _shared unit suite. The spend-cap alert path reads exactly these
      # three env vars (RESEND_API_KEY / ALERT_EMAIL_FROM / ALERT_EMAIL_TO) via
      # Deno.env.get; the test sets them to dummies and stubs fetch, so no email
      # leaves and no real network is touched. --allow-env is scoped to just
      # those names; no other permission (net/read/write) is granted.
      - name: Unit tests (deno test)
        working-directory: supabase/functions
        run: |
          deno test \
            --allow-env=RESEND_API_KEY,ALERT_EMAIL_FROM,ALERT_EMAIL_TO \
            _shared/spend_cap_test.ts
