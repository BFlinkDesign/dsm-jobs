name: Daily Job Scan (CD)

# Daily: run the real search, build the mobile PWA in web/, upload it as an
# artifact, and publish it to THIS repo's gh-pages branch (GitHub Pages serves
# it at the public site URL) so the end user's link auto-updates.
#
# Secrets (Settings -> Secrets -> Actions):
#   ADZUNA_APP_ID, ADZUNA_APP_KEY  -- required for live scans
#   JSEARCH_API_KEY                -- optional (Google-for-Jobs via RapidAPI)
#   USAJOBS_API_KEY, USAJOBS_EMAIL -- optional (federal; employer-stated pay)
#   JOOBLE_API_KEY                 -- optional
#   CAREERJET_AFFID                -- optional (affiliate ID)
# Provider keys are optional: each provider self-gates on its env var and the
# scan runs with whatever is configured (Adzuna remains the required base).
# Publishing uses the built-in GITHUB_TOKEN (contents: write below); no PAT.

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~6-7am Central)
  workflow_dispatch:

permissions:
  contents: write   # push gh-pages within this repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
      USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
      JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
      CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
      # Portal (all optional; push + sign-in UI self-disable when unset).
      # SUPABASE_SERVICE_KEY never reaches the page; PUBLISHABLE is browser-safe.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip if Adzuna key not configured
        id: gate
        shell: bash
        run: |
          if [ -z "${ADZUNA_APP_ID}" ] || [ -z "${ADZUNA_APP_KEY}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ADZUNA_APP_ID / ADZUNA_APP_KEY not set - skipping (not a failure)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build mobile job app
        if: steps.gate.outputs.run == 'true'
        run: python find_admin_jobs.py --contact "Brady" --push-supabase

      # Artifact = the site bundle only. The audit CSV (operator-only scam
      # reasons) is NOT uploaded: on a public repo, artifacts are downloadable
      # by anyone. Run the scanner locally to get the CSV.
      - name: Upload mobile app bundle
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jobs-app-${{ github.run_id }}
          path: web/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to gh-pages (this repo)
        if: steps.gate.outputs.run == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd web
          git init -q -b gh-pages
          git config user.name "dsm-job-finder bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -q -m "Daily update $(date -u +%Y-%m-%d)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          echo "::notice::Published gh-pages for ${GITHUB_REPOSITORY}"
