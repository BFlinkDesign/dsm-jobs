name: Daily Job Scan (CD)

# Daily: run the real search, build the mobile PWA in web/, upload it as an
# artifact, and publish it to THIS repo's gh-pages branch (GitHub Pages serves
# it at the public site URL) so the end user's link auto-updates.
#
# Secrets (Settings -> Secrets -> Actions):
#   ADZUNA_APP_ID, ADZUNA_APP_KEY  -- required for live scans
#   JSEARCH_API_KEY                -- optional (Google-for-Jobs via RapidAPI)
#   USAJOBS_API_KEY, USAJOBS_EMAIL -- optional (federal; employer-stated pay)
#   JOOBLE_API_KEY                 -- optional
#   CAREERJET_AFFID                -- optional (affiliate ID)
# Provider keys are optional: each provider self-gates on its env var and the
# scan runs with whatever is configured (Adzuna remains the required base).
# Publishing uses the built-in GITHUB_TOKEN (contents: write below); no PAT.

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~6-7am Central)
  push:
    branches: [main]   # deploy on every merge to main (no manual dispatch needed)
  workflow_dispatch:

permissions:
  contents: write   # push gh-pages within this repo
  issues: write     # open an issue if the daily build/publish fails (self-repair signal)

jobs:
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
      USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
      JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
      CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
      # Portal (all optional; push + sign-in UI self-disable when unset).
      # SUPABASE_SERVICE_KEY never reaches the page; PUBLISHABLE is browser-safe.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      # Sentry error monitoring (optional; page self-disables when unset). A
      # Sentry DSN is PUBLIC/embeddable, so it's a repo Variable, not a Secret.
      SENTRY_DSN: ${{ vars.SENTRY_DSN }}
    steps:
      # Read-only checkout: the gh-pages publish step below pushes with an
      # explicit x-access-token URL in a fresh `git init` repo under web/, so it
      # never uses these persisted credentials. Drop them (zizmor "artipacked").
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Skip if Adzuna key not configured
        id: gate
        shell: bash
        run: |
          if [ -z "${ADZUNA_APP_ID}" ] || [ -z "${ADZUNA_APP_KEY}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ADZUNA_APP_ID / ADZUNA_APP_KEY not set - skipping (not a failure)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      # Sentry Cron Monitoring: tell Sentry the scan STARTED (and upsert the
      # monitor's daily schedule so Sentry alerts if a future run never checks
      # in — the one gap the failure-issue step can't catch: a job that silently
      # stops firing). Uses the DSN's public key (no token). Self-gates on the
      # SENTRY_DSN repo Variable; any blip is non-fatal (|| true).
      - name: Sentry cron:in progress
        if: steps.gate.outputs.run == 'true' && env.SENTRY_DSN != ''
        shell: bash
        run: |
          key="${SENTRY_DSN#https://}"; key="${key%%@*}"
          hp="${SENTRY_DSN#*@}"; host="${hp%%/*}"; pid="${hp##*/}"
          echo "SENTRY_CRON=https://${host}/api/${pid}/cron/dsm-daily-scan/${key}/" >> "$GITHUB_ENV"
          curl -sS -m 15 -X POST "https://${host}/api/${pid}/cron/dsm-daily-scan/${key}/" \
            -H 'Content-Type: application/json' \
            --data-raw '{"monitor_config":{"schedule":{"type":"crontab","value":"0 12 * * *"},"checkin_margin":60,"max_runtime":15,"timezone":"Etc/UTC"},"status":"in_progress"}' \
            -o /dev/null -w 'sentry cron in_progress: %{http_code}\n' || true

      - name: Build mobile job app
        if: steps.gate.outputs.run == 'true'
        run: python find_admin_jobs.py --contact "Brady" --push-supabase

      - name: Set up Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Astro PWA
        if: steps.gate.outputs.run == 'true'
        working-directory: app
        run: npm ci --no-audit --no-fund && npm run build

      # Pre-publish safety gate: never serve Lilly a broken or gutted build.
      # The build can exit 0 yet produce a bad page (e.g. a regression that
      # drops every job, or malformed HTML). Validate the actual artifact here;
      # on failure the job stops BEFORE publish, so the last good site stays
      # live and the failure-issue step fires. This is what makes an auto-merged
      # fix safe: even if a bad change passes CI, it can't reach the live site.
      - name: Verify built page (pre-publish gate)
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json, pathlib, re, sys
          web = pathlib.Path("web")
          jp = web / "jobs.json"
          hp = web / "index.html"
          if not jp.exists():
              print("GATE FAIL: web/jobs.json was not produced"); sys.exit(1)
          if not hp.exists():
              print("GATE FAIL: web/index.html was not produced"); sys.exit(1)
          jobs = json.loads(jp.read_text(encoding="utf-8"))
          html = hp.read_text(encoding="utf-8")
          errs = []
          if len(jobs) < 5:
              errs.append(f"only {len(jobs)} jobs - a healthy scan yields dozens; likely a regression")
          if len(html) < 3000:
              errs.append(f"page too small ({len(html)} bytes) - likely truncated")
          if "Jobs for you" not in html:
              errs.append("missing 'Jobs for you' shell")
          if "view-host" not in html:
              errs.append("missing Astro app shell (#view-host)")
          if not re.search(r'"generated":\s*"\d{4}-\d{2}-\d{2}', (web / "meta.json").read_text(encoding="utf-8")):
              errs.append("no generated date in meta.json")
          if errs:
              print("::error::pre-publish gate FAILED: " + "; ".join(errs)); sys.exit(1)
          print(f"pre-publish gate OK: {len(jobs)} jobs, {len(html)} bytes")
          PY

      # Artifact = the site bundle only. The audit CSV (operator-only scam
      # reasons) is NOT uploaded: on a public repo, artifacts are downloadable
      # by anyone. Run the scanner locally to get the CSV.
      - name: Upload mobile app bundle
        if: steps.gate.outputs.run == 'true' && success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jobs-app-${{ github.run_id }}
          path: web/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to gh-pages (this repo)
        if: steps.gate.outputs.run == 'true' && success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd web
          git init -q -b gh-pages
          git config user.name "dsm-job-finder bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -q -m "Daily update $(date -u +%Y-%m-%d)"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          echo "::notice::Published gh-pages for ${GITHUB_REPOSITORY}"

      # Self-repair signal: if the daily build/publish failed, the last good
      # site stays live (we only publish on success) — but make the failure
      # loud by opening/refreshing an issue instead of a silent red X.
      - name: Sentry cron:ok
        if: steps.gate.outputs.run == 'true' && success() && env.SENTRY_DSN != ''
        shell: bash
        run: |
          key="${SENTRY_DSN#https://}"; key="${key%%@*}"
          hp="${SENTRY_DSN#*@}"; host="${hp%%/*}"; pid="${hp##*/}"
          curl -sS -m 15 "https://${host}/api/${pid}/cron/dsm-daily-scan/${key}/?status=ok" \
            -o /dev/null -w 'sentry cron ok: %{http_code}\n' || true

      - name: Sentry cron:error
        if: steps.gate.outputs.run == 'true' && failure() && env.SENTRY_DSN != ''
        shell: bash
        run: |
          key="${SENTRY_DSN#https://}"; key="${key%%@*}"
          hp="${SENTRY_DSN#*@}"; host="${hp%%/*}"; pid="${hp##*/}"
          curl -sS -m 15 "https://${host}/api/${pid}/cron/dsm-daily-scan/${key}/?status=error" \
            -o /dev/null -w 'sentry cron error: %{http_code}\n' || true

      - name: Open/refresh an issue if the daily scan failed
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = `The daily job scan failed at ${new Date().toISOString()}. ` +
              `The live site still shows the last good build.\n\n` +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "⚠️ Daily scan failing";
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "scan" });
            if (open.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: open.data[0].number, body });
            } else {
              const created = await github.rest.issues.create({ owner: context.repo.owner,
                repo: context.repo.repo, title, body, labels: ["scan", "outage", "automated"] });
              await github.rest.issues.addLabels({ owner: context.repo.owner,
                repo: context.repo.repo, issue_number: created.data.number, labels: ["auto-fix"] });
            }
