name: Daily Job Scan (CD)

# Daily: run the real search, build the mobile PWA in web/, upload it as an
# artifact, and (when PAGES_PUSH_TOKEN is set) publish it to the public Pages
# repo BFlinkDesign/dsm-jobs so the friend's link auto-updates.
#
# Secrets (Settings -> Secrets -> Actions):
#   ADZUNA_APP_ID, ADZUNA_APP_KEY  -- required for live scans
#   PAGES_PUSH_TOKEN               -- fine-grained PAT with Contents:write on
#                                     BFlinkDesign/dsm-jobs (optional; enables auto-publish)

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~6-7am Central)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      PAGES_PUSH_TOKEN: ${{ secrets.PAGES_PUSH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip if Adzuna key not configured
        id: gate
        shell: bash
        run: |
          if [ -z "${ADZUNA_APP_ID}" ] || [ -z "${ADZUNA_APP_KEY}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ADZUNA_APP_ID / ADZUNA_APP_KEY not set - skipping (not a failure)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build mobile job app
        if: steps.gate.outputs.run == 'true'
        run: python find_admin_jobs.py --contact "Brady"

      - name: Upload mobile app + audit CSV
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jobs-app-${{ github.run_id }}
          path: |
            web/
            admin-jobs-*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Publish to public Pages repo
        if: steps.gate.outputs.run == 'true' && env.PAGES_PUSH_TOKEN != ''
        shell: bash
        run: |
          cd web
          git init -q -b gh-pages
          git config user.name "dsm-job-finder bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -q -m "Daily update $(date -u +%Y-%m-%d)"
          git push -f "https://x-access-token:${PAGES_PUSH_TOKEN}@github.com/BFlinkDesign/dsm-jobs.git" gh-pages
          echo "::notice::Published to https://bflinkdesign.github.io/dsm-jobs/"
