name: Daily Job Scan (CD)

# Continuous delivery: run the real search daily, build the mobile PWA in web/,
# and publish it as a downloadable artifact. Add repo secrets ADZUNA_APP_ID and
# ADZUNA_APP_KEY (Settings -> Secrets -> Actions) to enable live scans.

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (~6-7am Central)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Skip if Adzuna key not configured
        id: gate
        shell: bash
        run: |
          if [ -z "${ADZUNA_APP_ID}" ] || [ -z "${ADZUNA_APP_KEY}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ADZUNA_APP_ID / ADZUNA_APP_KEY not set - skipping (not a failure)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build mobile job app
        if: steps.gate.outputs.run == 'true'
        run: python find_admin_jobs.py --contact "Brady"

      - name: Upload mobile app + audit CSV
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: jobs-app-${{ github.run_id }}
          path: |
            web/
            admin-jobs-*.csv
          if-no-files-found: warn
          retention-days: 14
