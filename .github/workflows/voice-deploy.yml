name: Deploy Rudy Voice

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-voice:
    name: Snapshot, configure, and deploy voice
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      PROJECT_REF: tcclohxvhmwgjrtdkkuw
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      VOICE_TTS: ${{ secrets.VOICE_TTS }}
      CHATTERBOX_MODEL: ${{ secrets.CHATTERBOX_MODEL }}
      SNAPSHOT_ARCHIVE_PASSPHRASE: ${{ secrets.SNAPSHOT_ARCHIVE_PASSPHRASE }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.12"

      - name: Verify required secret names are configured
        shell: bash
        run: |
          missing=()
          for name in \
            SUPABASE_URL \
            SUPABASE_SERVICE_KEY \
            SUPABASE_ACCESS_TOKEN \
            REPLICATE_API_TOKEN \
            SNAPSHOT_ARCHIVE_PASSPHRASE
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::missing required secret(s): %s\n' "${missing[*]}"
            exit 1
          fi
          echo "Required secret names are present."

      - name: Source readiness gate
        run: python scripts/verify_voice_readiness.py --source-only

      - name: Snapshot Supabase before voice changes
        shell: bash
        run: |
          export DSM_JOBS_SNAPSHOT_ROOT="$RUNNER_TEMP/dsm-jobs-production-snapshots"
          python scripts/snapshot_supabase.py
          python scripts/verify_supabase_schema.py --require-full
          snap_dir="$(find "$DSM_JOBS_SNAPSHOT_ROOT" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)"
          if [ -z "$snap_dir" ] || [ ! -f "$snap_dir/manifest.json" ]; then
            echo "::error::snapshot manifest was not created"
            exit 1
          fi
          echo "SNAP_DIR=$snap_dir" >> "$GITHUB_ENV"
          echo "SNAP_NAME=$(basename "$snap_dir")" >> "$GITHUB_ENV"

      - name: Encrypt snapshot archive
        shell: bash
        run: |
          archive="$RUNNER_TEMP/dsm-jobs-supabase-${SNAP_NAME}.tar.gz"
          encrypted="$archive.enc"
          tar -czf "$archive" -C "$SNAP_DIR" .
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in "$archive" \
            -out "$encrypted" \
            -pass env:SNAPSHOT_ARCHIVE_PASSPHRASE
          sha256sum "$encrypted" > "$encrypted.sha256"
          rm -f "$archive"
          echo "SNAP_ARCHIVE=$encrypted" >> "$GITHUB_ENV"
          echo "SNAP_ARCHIVE_SHA=$encrypted.sha256" >> "$GITHUB_ENV"

      - name: Upload encrypted snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: encrypted-supabase-snapshot-${{ env.SNAP_NAME }}
          path: |
            ${{ env.SNAP_ARCHIVE }}
            ${{ env.SNAP_ARCHIVE_SHA }}
          if-no-files-found: error
          retention-days: 14

      - name: Install Supabase CLI
        run: npm install -g supabase@2.109.0

      - name: Configure voice provider secrets
        shell: bash
        run: |
          voice_env="$RUNNER_TEMP/edge-voice.env"
          umask 077
          {
            printf 'REPLICATE_API_TOKEN=%s\n' "$REPLICATE_API_TOKEN"
            printf 'VOICE_TTS=%s\n' "${VOICE_TTS:-chatterbox}"
            printf 'CHATTERBOX_MODEL=%s\n' "${CHATTERBOX_MODEL:-resemble-ai/chatterbox}"
          } > "$voice_env"
          supabase secrets set --env-file "$voice_env" --project-ref "$PROJECT_REF"
          rm -f "$voice_env"

      - name: Deploy voice function
        run: supabase functions deploy voice --project-ref "$PROJECT_REF"

      - name: Verify JWT remains enforced
        shell: bash
        run: |
          code="$(curl -sS -o "$RUNNER_TEMP/voice-smoke.json" -w '%{http_code}' \
            -X POST "$SUPABASE_URL/functions/v1/voice" \
            -H 'Content-Type: application/json' \
            --data '{"mode":"tts","text":"Rudy voice deployment smoke"}')"
          if [ "$code" = "200" ]; then
            echo "::error::voice function accepted an unauthenticated request"
            exit 1
          fi
          echo "Unauthenticated voice smoke returned HTTP $code as expected."
