name: Camera (design pass)

# Renders the PWA in the pinned bundled Chromium on the runner and uploads the
# screenshots, so a sandbox without a browser can still SEE the rendered reality
# (invariant #7). Deterministic: pinned runner + pinned Playwright/Chromium +
# canned mock data. No PII. Runs on push to the camera branch and on dispatch.
on:
  push:
    branches: [claude/camera-pass]
  workflow_dispatch:

permissions:
  contents: write   # to publish the rendered shots to the camera-shots branch

jobs:
  camera:
    # Pinned runner image (not -latest) + pinned Playwright/Chromium + canned
    # mock data => a deterministic render every run.
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      # Read-only checkout: the publish step below pushes with an explicit
      # x-access-token URL, so it never needs these persisted credentials.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install pinned Playwright + bundled Chromium
        run: bash verify/setup-web.sh

      - name: Run the camera (build + render + shoot)
        run: python verify/camera.py
        continue-on-error: true   # still upload shots even if an invariant check fails

      - name: Determinism check — re-render the same build, compare pixel hashes
        run: |
          set -euo pipefail
          cp -r verify/shots /tmp/shots_run1
          rm -rf verify/shots
          python verify/camera.py --no-build       # same --mock HTML, render again
          ( cd /tmp/shots_run1 && sha256sum *.png | sort ) > /tmp/h1.txt
          ( cd verify/shots     && sha256sum *.png | sort ) > /tmp/h2.txt
          echo "--- run 1 ---"; cat /tmp/h1.txt
          if diff -u /tmp/h1.txt /tmp/h2.txt; then
            echo "DETERMINISTIC: identical pixels across two renders of the same build."
          else
            echo "NON-DETERMINISTIC: the two renders differ (see diff above)."; exit 1
          fi

      - name: Upload screenshots (artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: camera-shots
          path: |
            verify/shots/
            verify/report.json
          if-no-files-found: error
          retention-days: 5

      # Also publish the PNGs to a dedicated branch so a browserless sandbox can
      # `git fetch` and read them (artifact download needs auth we don't have there).
      - name: Publish shots to camera-shots branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Only publish a REAL render. camera.py runs continue-on-error so an
          # invariant *check* failure still leaves full shots worth seeing — but a
          # crashed render (no report.json, or no PNGs) must not push partial/
          # garbage frames as "the rendered reality" (invariant #7).
          if [ ! -f verify/report.json ] || [ -z "$(ls -A verify/shots/*.png 2>/dev/null)" ]; then
            echo "::warning::No complete render (missing report.json or shots) — not publishing."
            exit 0
          fi
          git config user.name "camera-bot"
          git config user.email "camera-bot@users.noreply.github.com"
          git switch -c camera-shots
          git add -f verify/shots verify/report.json
          git commit -m "camera shots for ${GITHUB_SHA::8}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" camera-shots
