name: Camera (design pass)

# Renders the PWA in REAL Chrome on the runner and uploads the screenshots as an
# artifact, so a sandbox without a browser can still SEE the rendered reality
# (invariant #7). Mock data only (no PII). Runs on push to the camera branch and
# on manual dispatch.
on:
  push:
    branches: [claude/camera-pass]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  camera:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Playwright + real Chrome
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chrome

      - name: Run the camera (build + render + shoot)
        run: python verify/camera.py
        continue-on-error: true   # still upload shots even if an invariant check fails

      - name: Upload screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: camera-shots
          path: |
            verify/shots/
            verify/report.json
          if-no-files-found: error
          retention-days: 5
