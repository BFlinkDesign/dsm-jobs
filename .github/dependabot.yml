# Keeps the repo from rotting on its own: weekly PRs to bump GitHub Actions
# (fixes the Node-20 deprecation) and dev tooling. Auto-merge can be enabled
# later; for now they surface as PRs that CI gates.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "automated"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies", "automated"]

  # The camera self-verifier pins playwright in its own requirements file.
  - package-ecosystem: "pip"
    directory: "/verify"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies", "automated"]

  # Dev-only CSS validator (Lightning CSS) — keep it pinned + fresh.
  - package-ecosystem: "npm"
    directory: "/verify/css"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies", "automated"]

  # The Astro app that BUILDS the deployed PWA — Astro/Vite security bumps land
  # here (was previously uncovered, so CVEs in the shipped toolchain went unbumped).
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels: ["dependencies", "automated"]
