project_id = "tcclohxvhmwgjrtdkkuw"

# Pin the auth gate in source so it survives redeploys and isn't just a
# deploy-time/dashboard default. The companion holds the paid Anthropic key;
# verify_jwt rejects unauthenticated requests at the platform edge, and the
# in-function getUser() check is the genuine second layer (invite-only users).
[functions.companion]
verify_jwt = true

# Resume tailoring reads private profile resume text and calls the paid model.
# Keep the platform edge gate aligned with the in-function getUser() check.
[functions.resume-tailor]
verify_jwt = true

# Rudy's provider-agnostic voice function. TTS defaults to Chatterbox when
# REPLICATE_API_TOKEN is configured; STT uses the first configured backend.
# Provider keys stay server-side; only signed-in users reach it.
[functions.voice]
verify_jwt = true

# Sends real Web Push notifications for due follow-up reminders. This is a
# server-to-server cron job (GitHub Actions -> here), not a page-invoked
# function — it needs the service role to read every user's due follow-ups,
# so a per-user JWT gate is the wrong shape. verify_jwt is OFF; the function
# authenticates the caller itself via the PUSH_CRON_SECRET shared secret
# (`x-cron-secret` header) so the endpoint isn't left open just because JWT
# verification is disabled.
[functions.send-followup-push]
verify_jwt = false
