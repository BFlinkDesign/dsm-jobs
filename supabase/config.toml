# Pin the auth gate in source so it survives redeploys and isn't just a
# deploy-time/dashboard default. The companion holds the paid Anthropic key;
# verify_jwt rejects unauthenticated requests at the platform edge, and the
# in-function getUser() check is the genuine second layer (invite-only users).
[functions.companion]
verify_jwt = true

# Resume tailoring reads private profile resume text and calls the paid model.
# Keep the platform edge gate aligned with the in-function getUser() check.
[functions.resume-tailor]
verify_jwt = true

# Rudy's voice (ElevenLabs TTS + speech-to-text). Holds the paid
# ELEVENLABS_API_KEY; only signed-in users reach it.
[functions.voice]
verify_jwt = true
